{% set name = "mesmer" %}
{% set pypiname = "mesmer-emulator" %}
{% set version = "1.0.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypiname[0] }}/{{ pypiname }}/{{ pypiname }}-{{ version }}.tar.gz
  sha256: e2c22edefbae72510e0cb3343ee73e6db208376344a5b2fac628b07baa154dbd

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=42
    - setuptools-scm >=7
  run:
    - python >={{ python_min }}
    - dask >=2025.04
    - deprecated
    - distributed  >=2025.4
    - joblib >=1.5
    - netcdf4 >=1.7
    - numpy >=2.1
    - packaging >=25.0
    - pandas >=2.2
    - pooch >=1.8
    - pyproj >=3.7
    - regionmask >=0.13
    - scikit-learn >=1.6
    - scipy >=1.15
    - statsmodels >=0.14
    - xarray >=2025.11

test:
  imports:
    - mesmer
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - python -c "import mesmer; assert mesmer.__version__ == '{{ version }}', mesmer.__version__"

about:
  home: https://github.com/MESMER-group/mesmer
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Modular Earth System Model Emulator with spatially Resolved output
  doc_url: https://mesmer-emulator.readthedocs.io/en/stable/
  dev_url: https://github.com/MESMER-group/mesmer

extra:
  recipe-maintainers:
    - znicholls
    - mathause
